name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  release:
    needs: lint
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Configure git author
        uses: MaxiGarcia13/gh-actions/.github/actions/configure-git-author@main

      - name: Version packages
        id: version-commit
        run: |
          before="$(git rev-parse HEAD)"
          npm run version-packages -- --first-release
          after="$(git rev-parse HEAD)"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git push
          git push --tags
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.version-commit.outputs.changed == 'true'
        run: npx nx release publish --projects=@maxigarcia/js-theme-animation --first-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
