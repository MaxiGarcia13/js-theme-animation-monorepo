name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  release:
    needs: lint
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Version packages
        run: npm run version-packages

      - name: Configure git author
        uses: MaxiGarcia13/gh-actions/.github/actions/configure-git-author@main

      - name: Commit and push version bump
        id: version-commit
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: version packages"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.version-commit.outputs.changed == 'true'
        run: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read release tag
        id: release_tag
        uses: MaxiGarcia13/gh-actions/.github/actions/read-release-tag@main

  release-notes:
    needs: release
    uses: MaxiGarcia13/gh-actions/.github/workflows/create-release-notes.yml@main
    with:
      tag: ${{ needs.release.outputs.tag }}
